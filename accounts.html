<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./accounts.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/png" href="./pngtree-vector-bank-icon-png-image_708538.jpg">
</head>
<body>
    <div class="container py-5">
        <h2 class="text-white mb-4">
            <i class="bi bi-wallet2"></i>
            My Accounts
        </h2>
        <div class="row g-4">
            <div class="col-lg-6">
                <div class="account-card">
                    <h4>Savings Account</h4>
                    <h2>₹8,75,320</h2>
                    <p><strong>Account No :</strong> XXXX XXXX 4589</p>
                    <p><strong>Branch :</strong> Chennai</p>
                    <p><strong>Status :</strong>
                        <span class="badge bg-success">Active</span>
                    </p>
                    <button class="btn btn-info">
                        View Details
                    </button>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="account-card current">
                    <h4>Current Account</h4>
                    <h2>₹2,35,600</h2>
                    <p><strong>Account No :</strong> XXXX XXXX 8975</p>
                    <p><strong>Branch :</strong> Chennai</p>
                    <p><strong>Status :</strong>
                        <span class="badge bg-success">Active</span>
                    </p>
                    <button class="btn btn-light">
                        View Details
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
