<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Statement</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./transcation.css">
    <link rel="icon" type="image/png" href="./pngtree-vector-bank-icon-png-image_708538.jpg">

<body class="bg-light">

            <h2 class="fw-bold">Account Statement</h2>
            <div class="d-flex gap-2">

                    <i class="bi bi-download"></i>
                    Download PDF
                </button>
            </div>
        </div>
        <div class="card shadow-sm border-0">
            <div class="card-body">

                    <table class="table table-striped table-hover align-middle mb-0">
                        <thead class="table-primary">
                            <tr>
                                <th>Date</th>
                                <th>Reference No</th>
                                <th>Description</th>
                                <th>Debit</th>
                                <th>Credit</th>
                                <th>Balance</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>08-07-2026</td>
                                <td>TXN458965</td>
                                <td>Salary Credit</td>
                                <td>-</td>
                                <td class="text-success">₹50,000</td>
                                <td>₹8,75,320</td>
                            </tr>
                            <tr>
                                <td>07-07-2026</td>
                                <td>TXN458966</td>
                                <td>Amazon Purchase</td>
                                <td class="text-danger">₹2,450</td>
                                <td>-</td>
                                <td>₹8,25,320</td>
                            </tr>
                            <tr>
                                <td>06-07-2026</td>
                                <td>TXN458967</td>
                                <td>Electricity Bill</td>
                                <td class="text-danger">₹1,250</td>
                                <td>-</td>
                                <td>₹8,27,770</td>
                            </tr>
                            <tr>
                                <td>05-07-2026</td>
                                <td>TXN458968</td>
                                <td>UPI Received</td>
                                <td>-</td>
                                <td class="text-success">₹3,000</td>
                                <td>₹8,29,020</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
